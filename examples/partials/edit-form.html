<form id="ajax-edit-form" novalidate>
    <div class="form-group">
        <label for="field-name">Full name</label>
        <input type="text" class="form-control" id="field-name" value="Pantelis Panteli" required>
    </div>
    <div class="form-group">
        <label for="field-email">Email address</label>
        <input type="email" class="form-control" id="field-email" value="pantelis@example.com" required>
    </div>
    <div class="form-group">
        <label for="field-role">Role</label>
        <select class="form-control" id="field-role">
            <option selected>Administrator</option>
            <option>Editor</option>
            <option>Viewer</option>
        </select>
    </div>
    <div class="form-group mb-0">
        <label for="field-notes">Notes</label>
        <textarea class="form-control" id="field-notes" rows="3" placeholder="Optional notes…"></textarea>
    </div>
</form>
